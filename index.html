<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My-IMEI</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #f8fafc;
}

.card {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h3 style="text-align:center">📊 Log Masuk</h3>
<div id="logList"></div>

<script>

// 🔥 GANTI DENGAN URL KAMU
const BASE_URL = "https://script.google.com/macros/s/AKfycbwQhNThUjYYEt0HT2s4gyJhUQqygu5B65d-omwgIwNVs652rbR4e0YRxCTHZzPzZynd/exec";

// ================= DEVICE =================
function getDeviceData() {
  let id = localStorage.getItem("device_id");

  if (!id) {
    id = "HP-" + Math.random().toString(36).substr(2,8).toUpperCase();
    localStorage.setItem("device_id", id);
  }

  return { id };
}

// ================= CEK AKSES =================
async function cekAkses() {
  const device = getDeviceData();

  const res = await fetch(BASE_URL + "?action=cek&deviceId=" + device.id);
  const data = await res.json();

  handleResponse(data, device);
}

// ================= RESPONSE =================
function handleResponse(res, device) {
  if (res.status === "DEVICE_TIDAK_TERDAFTAR") {
    alert("Device belum terdaftar: " + device.id);
  }

  if (res.status === "OK") {
    alert("Selamat datang " + res.nama);
  }
}

// ================= LOAD LOG =================
async function loadLog() {
  const res = await fetch(BASE_URL + "?action=log");
  const data = await res.json();

  const el = document.getElementById("logList");
  el.innerHTML = "";

  [...data].reverse().forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${item.nama}</b><br>
      ${item.device}<br>
      ${item.status}
    `;

    el.appendChild(div);
  });
}

// ================= INIT =================
window.onload = () => {
  cekAkses();
  loadLog();
};

</script>

</body>
</html>
